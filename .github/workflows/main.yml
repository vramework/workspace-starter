name: Test
run-name: Testing workflow
on: [push]
jobs:
  main:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:alpine
        env:
          POSTGRES_PASSWORD: password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4
      - run: yarn install
      - run: yarn prebuild
      - run: yarn tsc
